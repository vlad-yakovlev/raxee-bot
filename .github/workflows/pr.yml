---
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  npm-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/npm-ci

  lint:
    needs:
      - npm-ci
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/npm-ci
      - name: Run lint
        run: npm run lint

  compile:
    needs:
      - npm-ci
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/npm-ci
      - name: Run compile
        run: npm run compile

  test:
    needs:
      - npm-ci
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/npm-ci
      - name: Run test
        run: npm run test
