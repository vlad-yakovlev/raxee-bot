---
name: Coverage

on:
  push:
    branch:
      - master
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test:ci -- --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v3
